name: Build Project
on:
  release:
    types: [published]
env:
  PROJECT_NAME: "GraveyardGunner"
  UNREAL_ENGINE_VERSION: "5.6"
  AMI_ID: "ami-0f6317f3c8844f32c"
  BUCKET_NAME: "downloads.sawnoffstudios.com"
  DISTRIBUTION_ID: "EN2TKGJZBYTGO"
  INSTANCE_TYPE: "z1d.6xlarge"
permissions:
  id-token: write
  contents: read
jobs:
  StartEC2Instance:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: ${{ env.PROJECT_NAME }}Build-${{ github.sha }}
          aws-region: ap-southeast-2
      - name: Clone repository
        uses: actions/checkout@v7
        with:
          lfs: false
      - name: Deploy CloudFormation Stack
        uses: aws-actions/aws-cloudformation-github-deploy@v2
        with:
          name: ${{ env.PROJECT_NAME }}BuildStack-${{ github.sha }}
          template: ${{ github.workspace }}/infra-build.yml
          parameter-overrides: "AmiId=${{ env.AMI_ID }},InstanceType=${{ env.INSTANCE_TYPE }},IamFleetRole=${{ secrets.IAM_FLEET_ROLE }}"

  BuildProject:
    runs-on: [self-hosted, unreal-engine-56]
    timeout-minutes: 120
    needs: StartEC2Instance
    steps:
      - name: Clone repository
        uses: actions/checkout@v7
        with:
          lfs: true
      - name: Update version number
        shell: powershell
        run: |
          .\update-version-number.ps1
      - name: Build project
        shell: powershell
        run: |
            # Build the project using Unreal Engine's command line tools
            & "C:\Program Files\Epic Games\UE_${{ env.UNREAL_ENGINE_VERSION }}\Engine\Build\BatchFiles\RunUAT.bat" BuildCookRun -project="${{ github.workspace }}\${{ env.PROJECT_NAME }}.uproject" -noP4 -platform=Win64 -clientconfig=Shipping -serverconfig=Shipping -cook -allmaps -build -stage -pak -archive -nodebuginfo -nocompileuat -archivedirectory="${{ github.workspace }}\Output"
      - name: Zip files for upload
        shell: powershell
        run: |
          Compress-Archive -Path ${{ github.workspace }}\Output\Windows\* -DestinationPath ${{ github.workspace }}\${{ env.PROJECT_NAME }}-${{ github.ref_name }}.zip
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          role-session-name: ${{ env.PROJECT_NAME }}Build-${{ github.sha }}
          aws-region: ap-southeast-2
      - name: Copy files to S3 bucket
        shell: powershell
        run: |
          aws s3 cp ${{ github.workspace }}/${{ env.PROJECT_NAME }}-${{ github.ref_name }}.zip s3://${{ env.BUCKET_NAME }}/${{ env.PROJECT_NAME }}-${{ github.ref_name }}.zip
      - name: Generate download template
        shell: powershell
        run: |
          $downloadTemplate = Get-Content -Path ${{ github.workspace }}\${{ env.PROJECT_NAME }}-Latest.html
          $downloadTemplate = $downloadTemplate -replace '\{DOWNLOAD_URL}', '${{ env.BUCKET_NAME }}/${{ env.PROJECT_NAME }}-${{ github.ref_name }}.zip'
          $downloadTemplate | Out-File -FilePath ${{ github.workspace }}\${{ env.PROJECT_NAME }}-Latest.html
      - name: Upload download template
        shell: powershell
        run: |
          aws s3 rm s3://${{ env.BUCKET_NAME }}/${{ env.PROJECT_NAME }}-Latest.html
          aws s3 cp ${{ github.workspace }}/${{ env.PROJECT_NAME }}-Latest.html s3://${{ env.BUCKET_NAME }}/${{ env.PROJECT_NAME }}-Latest.html
      - name: Invalidate CloudFront cache
        shell: powershell
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.DISTRIBUTION_ID }} --paths "/${{ env.PROJECT_NAME }}-Latest.html"

  StopEC2Instance:
    runs-on: ubuntu-latest
    needs: BuildProject
    if: always()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          role-session-name: ${{ env.PROJECT_NAME }}Build-${{ github.sha }}
          aws-region: ap-southeast-2
      - name: Delete CloudFormation Stack
        run: |
          aws cloudformation delete-stack --stack-name ${{ env.PROJECT_NAME }}BuildStack-${{ github.sha }}
